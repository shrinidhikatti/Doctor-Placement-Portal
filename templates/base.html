<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Doctor Placement Portal — Belagavi{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
  <style>
    body { background: #f8f9fa; }
    .portal-card { max-width: 720px; margin: 2rem auto; }
    .section-heading { font-size: .75rem; font-weight: 700; letter-spacing: .08em;
                       text-transform: uppercase; color: #6c757d; margin: 1.5rem 0 .5rem; }
    .district-badge { font-size: .9rem; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark bg-primary">
    <div class="container">
      <span class="navbar-brand fw-semibold">
        District Health Office — Belagavi &nbsp;|&nbsp; Doctor Placement Portal
      </span>
    </div>
  </nav>

  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmLwRCrBkBAbKLdFf9SgOajMhZWS"
          crossorigin="anonymous"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
